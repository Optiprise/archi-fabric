# Deploy Archi HTML Report
name: Deploy Archi HTML Report


on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  ARCHI_VERSION: "5.10.0"
  

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Cache
        uses: actions/cache@v5.0.5
        with:
          path: Archi/
          key: Archi-${ARCHI_VERSION}
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies for Archi
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb dbus-x11 libgtk2.0-0 \
          libswt-gtk-4-jni at-spi2-core libxext6 libxrender1 libxi6 libxtst6 libglib2.0-0 \
          libcairo2 libpango-1.0-0 libpangocairo-1.0-0 unzip patch fontconfig \
          fonts-comfortaa fonts-dejavu fonts-liberation fonts-noto 
          
      - name: Cache Archi installation
        id: cache-archi
        uses: actions/cache@v4
        with:
          path: Archi
          key: Archi-${{ env.ARCHI_VERSION }}

      - name: Download Archi
        if: steps.cache-archi.outputs.cache-hit != 'true'
        run: |
          set -e

          PRIMARY_URL="https://github.com/archimatetool/archi.io/releases/download/${ARCHI_VERSION}/Archi-Linux64-${ARCHI_VERSION}.tgz"
          FALLBACK_URL="https://www.archimatetool.com/downloads/archi/${ARCHI_VERSION}/Archi-Linux64-${ARCHI_VERSION}.tgz"

          echo "Trying primary download location..."
          if curl -fsSL -o archi.tgz "$PRIMARY_URL"; then
            echo "Downloaded Archi from GitHub release."
          else
            echo "Primary download failed. Trying fallback location..."
            curl -fsSL -o archi.tgz "$FALLBACK_URL"
            echo "Downloaded Archi from Archi website."
          fi

            tar zxf archi.tgz -C .
            chmod +x Archi/Archi
            rm -f archi.tgz
            echo "Archi ${ARCHI_VERSION} installed successfully"

      - name: Generate HTML Report
        run: |
          dbus-run-session -- xvfb-run -a Archi/Archi \
           -application com.archimatetool.commandline.app \
          -consoleLog -nosplash \
          --loadModel "${{ github.workspace }}/model.archimate" \
          --html.createReport "${{ github.workspace }}/public"

      - name: Patch HTML Report
        run: |
          mkdir -p public/img
          cp "${{ github.workspace }}/images/_Pp6G8GZmEfGQQKn-IWxYHw.svg" "${{ github.workspace }}/public/img/logo.svg"
          curl -fsSL -o marked.min.js https://cdn.jsdelivr.net/npm/marked/marked.min.js
          mv marked.min.js "${{ github.workspace }}/public/js/"
          curl -fsSL -o purify.min.js https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js
          mv purify.min.js "${{ github.workspace }}/public/js/"
          patch -p1 "${{ github.workspace }}/public/css/model.css" "${{ github.workspace }}/.github/workflows/ci/patchfiles/model.css.patch"
          patch -p1 "${{ github.workspace }}/public/index.html" "${{ github.workspace }}/.github/workflows/ci/patchfiles/index.html.patch"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ github.workspace }}/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

        

